name: GPSD
description: Run gpsd in a container to expose GPS data over TCP
version: 0.1.1
slug: gpsd
url: https://github.com/carleeno/ha-addon-gpsd
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
startup: services
boot: auto
init: false
host_network: false
ports:
  2947/tcp: 2947
ports_description:
  2947/tcp: "gpsd TCP port"
usb: true
uart: true
udev: true
options:
  device: null
  baud: 9600
  gpsd_options: "-n"
schema:
  device: device
  baud: int
  gpsd_options: str
